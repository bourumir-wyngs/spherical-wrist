name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  MATURIN_VERSION: "1.12.3"
  MATURIN_BUILD_ARGS: >-
    --release
    --locked
    --out dist
    --compatibility pypi

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches Cargo version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: python
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          import os
          import tomllib
          from pathlib import Path

          with Path("Cargo.toml").open("rb") as file:
              version = tomllib.load(file)["package"]["version"]

          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]

          if actual != expected:
              raise SystemExit(
                  f"Release tag {actual!r} does not match package version {expected!r}"
              )

  linux-x86_64:
    name: manylinux x86_64 py${{ matrix.python-version }}
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v${{ env.MATURIN_VERSION }}
          target: x86_64
          manylinux: "2014"
          before-script-linux: >-
            yum install -y
            gcc-c++
            pkgconfig
            libX11-devel
            alsa-lib-devel
            systemd-devel
            wayland-devel
            libxkbcommon-devel
          args: ${{ env.MATURIN_BUILD_ARGS }} -i python${{ matrix.python-version }}

      - name: Install and import wheel
        shell: python
        run: |
          import os
          import subprocess
          import sys
          import tempfile

          dist = os.path.join(os.environ["GITHUB_WORKSPACE"], "dist")

          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "numpy>=1.26.4", "scipy>=1.16.0",
          ])
          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "--no-index",
              "--no-deps",
              "--find-links", dist,
              "spherical-wrist",
          ])

          with tempfile.TemporaryDirectory() as directory:
              subprocess.check_call([
                  sys.executable,
                  "-c",
                  "import spherical_wrist; import spherical_wrist._internal",
              ], cwd=directory)

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux-x86_64-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  windows-x86_64:
    name: Windows x86_64 py${{ matrix.python-version }}
    needs: preflight
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v${{ env.MATURIN_VERSION }}
          target: x86_64-pc-windows-msvc
          args: ${{ env.MATURIN_BUILD_ARGS }} -i python

      - name: Install and import wheel
        shell: python
        run: |
          import os
          import subprocess
          import sys
          import tempfile

          dist = os.path.join(os.environ["GITHUB_WORKSPACE"], "dist")

          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "numpy>=1.26.4", "scipy>=1.16.0",
          ])
          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "--no-index",
              "--no-deps",
              "--find-links", dist,
              "spherical-wrist",
          ])

          with tempfile.TemporaryDirectory() as directory:
              subprocess.check_call([
                  sys.executable,
                  "-c",
                  "import spherical_wrist; import spherical_wrist._internal",
              ], cwd=directory)

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.platform.arch }} py${{ matrix.python-version }}
    needs: preflight
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        platform:
          - arch: x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            os: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v${{ env.MATURIN_VERSION }}
          target: ${{ matrix.platform.target }}
          args: ${{ env.MATURIN_BUILD_ARGS }} -i python

      - name: Install and import wheel
        shell: python
        run: |
          import os
          import subprocess
          import sys
          import tempfile

          dist = os.path.join(os.environ["GITHUB_WORKSPACE"], "dist")

          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "numpy>=1.26.4", "scipy>=1.16.0",
          ])
          subprocess.check_call([
              sys.executable, "-m", "pip", "install",
              "--no-index",
              "--no-deps",
              "--find-links", dist,
              "spherical-wrist",
          ])

          with tempfile.TemporaryDirectory() as directory:
              subprocess.check_call([
                  sys.executable,
                  "-c",
                  "import spherical_wrist; import spherical_wrist._internal",
              ], cwd=directory)

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.arch }}-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  sdist:
    name: sdist
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v${{ env.MATURIN_VERSION }}
          command: sdist
          args: --out dist

      - name: Install Linux native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ \
            pkg-config \
            libx11-dev \
            libasound2-dev \
            libudev-dev \
            libxkbcommon-x11-0 \
            libwayland-dev \
            libxkbcommon-dev

      - name: Prove sdist builds
        run: |
          python -m pip install --upgrade pip
          python -m pip install "maturin[patchelf]==${MATURIN_VERSION}"
          python -m pip wheel --no-build-isolation --no-deps --wheel-dir sdist-wheelhouse dist/*.tar.gz

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  release-artifact-check:
    name: Release artifact check
    needs:
      - linux-x86_64
      - windows-x86_64
      - macos
      - sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install release-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install packaging pytest twine

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check release artifacts
        run: |
          python scripts/check_release_artifacts.py check --dist-dir dist --report-dir release-artifact-report --venv-dir release-artifact-venv

      - name: Upload release artifact report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-artifact-report
          path: release-artifact-report/
          if-no-files-found: ignore

  github-release:
    name: GitHub Release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - release-artifact-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download wheel distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/* --clobber
          else
            gh release create "$TAG_NAME" dist/* --verify-tag --generate-notes --title "$TAG_NAME"
          fi

  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - release-artifact-check
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download wheel distributions
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
